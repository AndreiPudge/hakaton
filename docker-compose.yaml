services:
  # One-shot preboot контейнер
  shared:
    build:
      context: .
      dockerfile: shared/shared.Dockerfile
    volumes:
      - ./data:/data
    restart: "no"

  # ML сервис
  ml:
    build:
      context: .
      dockerfile: ml/ml.Dockerfile
    volumes:
      - ./data:/data
    env_file:
      - .env
    depends_on:
      shared:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ml:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Backend
  backend:
    build:
      context: .
      dockerfile: backend/backend.Dockerfile
    volumes:
      - ./data:/data:ro
    env_file:
      - .env
    depends_on:
      shared:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/frontend.Dockerfile
    depends_on:
      shared:
        condition: service_completed_successfully
    ports:
      - "3000:8080"
    restart: unless-stopped
